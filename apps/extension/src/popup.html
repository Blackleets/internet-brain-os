<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hephaestus</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">HEPHAESTUS</p>
      <h1>Forge this page</h1>
      <p class="muted">Turn the current public page into traceable Evidence.</p>
      <label for="pairing-code">Pair this extension</label>
      <input id="pairing-code" type="text" inputmode="text" maxlength="12" autocomplete="one-time-code" placeholder="Eight-character startup code">
      <button id="pair-kernel" type="button">Pair securely</button>
      <details>
        <summary>Manual recovery</summary>
      <label for="kernel-token">Local Kernel token</label>
      <input id="kernel-token" type="password" autocomplete="off" placeholder="Read token file only for recovery">
      <button id="save-token" type="button">Save local token</button>
      </details>
      <label for="case-target">Destination</label>
      <select id="case-target">
        <option value="">Start a new Case</option>
      </select>
      <button id="capture" type="button">Send to the forge</button>
      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
